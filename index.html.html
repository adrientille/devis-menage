<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Devis — Famille & Domicile Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN SYSTEM — Famille & Domicile Services
   ============================================================ */
:root{
  --violet:       #5B1A99;
  --violet-deep:  #3D0F70;
  --violet-soft:  #F2E9FB;
  --rose:         #E91E8C;
  --rose-soft:    #FDE6F1;
  --cream:        #FDF9F6;
  --cream-warm:   #F8EFE6;
  --sauge:        #3F8F6B;
  --sauge-soft:   #E6F3EC;
  --ambre:        #C98A1E;
  --ambre-soft:   #FAF0DD;
  --rouge:        #C0392B;
  --rouge-soft:   #FBEAE7;
  --ink:          #1F1530;
  --ink-soft:     #6B5E7E;
  --line:         #E6DCEF;
  --white:        #FFFFFF;

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --shadow-sm: 0 2px 8px rgba(31,21,48,.06);
  --shadow-md: 0 8px 24px rgba(91,26,153,.12);
  --shadow-lg: 0 16px 48px rgba(91,26,153,.18);

  --font-display: 'Fraunces', serif;
  --font-body: 'Inter', -apple-system, sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;color:var(--violet-deep);line-height:1.15}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
:focus-visible{outline:3px solid var(--rose);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important}}

.app-shell{min-height:100vh;display:flex;flex-direction:column}
.hidden{display:none !important}

/* ---- Logo / parenthèses motif ---- */
.logo-img{height:52px;object-fit:contain}
.paren-frame{position:relative}
.paren-frame::before,.paren-frame::after{
  content:"";position:absolute;width:14px;height:34px;
  border:3px solid var(--rose);border-radius:50%;
  top:50%;transform:translateY(-50%);
  opacity:0;transition:opacity .25s ease;
}
.paren-frame::before{left:-22px;border-right:none;border-radius:50% 0 0 50%/100%}
.paren-frame::after{right:-22px;border-left:none;border-radius:0 50% 50% 0/100%}
.paren-frame.is-active::before,.paren-frame.is-active::after{opacity:1}

/* ---- Boutons ---- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 26px;border-radius:50px;border:none;
  font-size:.95rem;font-weight:600;letter-spacing:.01em;
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--violet);color:white;box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--violet-deep);box-shadow:var(--shadow-md)}
.btn-accent{background:var(--rose);color:white;box-shadow:var(--shadow-sm)}
.btn-accent:hover{background:#c4177a;box-shadow:var(--shadow-md)}
.btn-ghost{background:transparent;color:var(--violet);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--violet);background:var(--violet-soft)}
.btn-danger{background:var(--rouge-soft);color:var(--rouge)}
.btn-danger:hover{background:#f5d4cf}
.btn-block{width:100%}
.btn-sm{padding:8px 16px;font-size:.82rem;border-radius:30px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* ---- Cards ---- */
.card{
  background:white;border-radius:var(--radius-lg);
  border:1.5px solid var(--line);
  box-shadow:var(--shadow-sm);
  padding:28px;
}
.card-choice{
  background:white;border-radius:var(--radius-md);
  border:2px solid var(--line);padding:24px;cursor:pointer;
  transition:border-color .15s ease, box-shadow .15s ease, transform .1s ease;
  text-align:left;
}
.card-choice:hover{border-color:var(--violet-mid,#D9A8EE);box-shadow:var(--shadow-sm)}
.card-choice.selected{border-color:var(--rose);box-shadow:0 0 0 4px var(--rose-soft)}
.card-choice:active{transform:scale(.99)}

/* ---- Inputs ---- */
.field{margin-bottom:18px}
.field label{display:block;font-size:.85rem;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
.field input[type=text],.field input[type=email],.field input[type=tel],.field input[type=number],
.field input[type=password],.field select,.field textarea{
  width:100%;padding:13px 16px;border-radius:var(--radius-sm);
  border:1.5px solid var(--line);background:white;font-size:.95rem;color:var(--ink);
  transition:border-color .15s ease;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--violet);outline:none;box-shadow:0 0 0 3px var(--violet-soft)}
.field-hint{font-size:.78rem;color:var(--ink-soft);margin-top:5px}

/* ---- Radio pills ---- */
.pill-group{display:flex;gap:10px;flex-wrap:wrap}
.pill{
  padding:10px 20px;border-radius:50px;border:1.5px solid var(--line);
  background:white;font-size:.88rem;font-weight:600;color:var(--ink-soft);
  transition:all .15s ease;
}
.pill.active{background:var(--violet);border-color:var(--violet);color:white}

/* ---- Toggle switch ---- */
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.switch-row:last-child{border-bottom:none}
.switch-label{font-weight:500;font-size:.92rem}
.switch{position:relative;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch-track{position:absolute;inset:0;background:var(--line);border-radius:50px;transition:background .2s ease;cursor:pointer}
.switch-track::before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch input:checked + .switch-track{background:var(--rose)}
.switch input:checked + .switch-track::before{transform:translateX(20px)}

/* ---- Level selector (Léger/Standard/Approfondi) ---- */
.level-group{display:flex;gap:8px;flex-wrap:wrap}
.level-btn{
  flex:1;min-width:90px;padding:10px 8px;border-radius:var(--radius-sm);
  border:1.5px solid var(--line);background:white;font-size:.82rem;font-weight:600;
  color:var(--ink-soft);text-align:center;transition:all .15s ease;
}
.level-btn.active-leger{background:var(--sauge-soft);border-color:var(--sauge);color:#1A5C42}
.level-btn.active-standard{background:var(--ambre-soft);border-color:var(--ambre);color:#8A5E14}
.level-btn.active-approfondi{background:var(--rose-soft);border-color:var(--rose);color:#8B005A}

/* ---- Progress bar (organique) ---- */
.progress-wrap{padding:18px 20px 0}
.progress-track{height:6px;background:var(--violet-soft);border-radius:50px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--rose));border-radius:50px;transition:width .4s ease}
.progress-steps{display:flex;justify-content:space-between;margin-top:10px;font-size:.72rem;color:var(--ink-soft);font-weight:600}
.progress-steps .step.done,.progress-steps .step.current{color:var(--violet)}

/* ---- Alerts ---- */
.alert{border-radius:var(--radius-sm);padding:14px 18px;font-size:.88rem;display:flex;gap:10px;align-items:flex-start}
.alert-warning{background:var(--ambre-soft);color:#7A5310;border:1px solid #EBCB8A}
.alert-error{background:var(--rouge-soft);color:#8A2D20;border:1px solid #E8B6AC}
.alert-success{background:var(--sauge-soft);color:#1A5C42;border:1px solid #A8D9C0}
.alert-info{background:var(--violet-soft);color:var(--violet-deep);border:1px solid #D9C2EF}

/* ---- Badges ---- */
.badge{display:inline-flex;padding:4px 12px;border-radius:50px;font-size:.72rem;font-weight:700}
.badge-leger{background:var(--sauge-soft);color:#1A5C42}
.badge-standard{background:var(--ambre-soft);color:#8A5E14}
.badge-approfondi{background:var(--rose-soft);color:#8B005A}

/* ---- Layout helpers ---- */
.container{max-width:760px;margin:0 auto;width:100%;padding:0 18px}
.container-wide{max-width:1100px;margin:0 auto;width:100%;padding:0 18px}
.section-title{font-size:1.5rem;margin-bottom:6px}
.section-sub{color:var(--ink-soft);font-size:.92rem;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.stack{display:flex;flex-direction:column;gap:14px}
.divider{height:1px;background:var(--line);margin:20px 0}

/* ---- Header ---- */
.app-header{
  background:white;border-bottom:1.5px solid var(--line);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
}
.user-badge{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--ink-soft);font-weight:600}
.user-badge .dot{width:8px;height:8px;background:var(--sauge);border-radius:50%}
.header-actions{display:flex;gap:10px;align-items:center}

/* ---- Login screen ---- */
.login-screen{
  position:fixed;inset:0;
  background:radial-gradient(circle at 20% 20%, var(--violet-soft) 0%, var(--cream) 55%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.login-card{
  background:white;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  padding:44px 36px;max-width:380px;width:100%;text-align:center;
}
.login-card .logo-img{height:64px;margin-bottom:28px}
.login-card h1{font-size:1.3rem;margin-bottom:6px}
.login-card .sub{color:var(--ink-soft);font-size:.85rem;margin-bottom:28px}
.login-error{color:var(--rouge);font-size:.85rem;margin-top:12px;min-height:18px}

/* ---- Mobile bottom nav for tunnel ---- */
.tunnel-footer{
  position:sticky;bottom:0;background:white;border-top:1.5px solid var(--line);
  padding:14px 20px;display:flex;gap:12px;justify-content:space-between;z-index:30;
}

/* ---- Accordion (mobile task config) ---- */
.accordion-item{border:1.5px solid var(--line);border-radius:var(--radius-md);margin-bottom:10px;overflow:hidden}
.accordion-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer;background:white}
.accordion-head.checked{background:var(--violet-soft)}
.accordion-body{padding:0 18px 18px;display:none}
.accordion-item.open .accordion-body{display:block}
.accordion-chevron{transition:transform .2s ease}
.accordion-item.open .accordion-chevron{transform:rotate(180deg)}

/* ---- Spinner ---- */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---- Range fourchette ---- */
.range-display{font-family:var(--font-display);font-weight:600;color:var(--violet-deep)}

/* ---- Table (admin) ---- */
table.admin-table{width:100%;border-collapse:collapse;font-size:.88rem}
table.admin-table th{text-align:left;padding:10px 12px;color:var(--ink-soft);font-weight:600;border-bottom:2px solid var(--line)}
table.admin-table td{padding:10px 12px;border-bottom:1px solid var(--line)}
table.admin-table tr:hover td{background:var(--violet-soft)}

/* ---- Tabs (admin) ---- */
.tabs{display:flex;gap:6px;border-bottom:1.5px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:12px 18px;border:none;background:transparent;font-weight:600;color:var(--ink-soft);border-bottom:3px solid transparent;white-space:nowrap;font-size:.88rem}
.tab-btn.active{color:var(--violet);border-color:var(--rose)}

/* ---- Scrollbar light touch ---- */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}

@media print{
  .no-print{display:none !important}
}
</style>
</head>
<body>

<div id="app" class="app-shell">

  <!-- ============================================================
       ECRAN DE CONNEXION
       ============================================================ -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <img id="loginLogo" class="logo-img" alt="Famille & Domicile Services">
      <h1>Espace devis</h1>
      <div class="sub">Connectez-vous pour créer ou consulter un devis</div>
      <div class="field" style="text-align:left">
        <label for="loginUser">Identifiant</label>
        <input type="text" id="loginUser" autocomplete="username" placeholder="ex: admin">
      </div>
      <div class="field" style="text-align:left;margin-bottom:8px">
        <label for="loginPass">Mot de passe</label>
        <input type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-block" id="btnLogin" onclick="doLogin()">Se connecter</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ============================================================
       APP PRINCIPALE (cachée jusqu'à connexion)
       ============================================================ -->
  <div id="mainApp" class="hidden">
    <header class="app-header no-print">
      <img id="headerLogo" class="logo-img" style="height:38px" alt="Famille & Domicile Services">
      <div class="header-actions">
        <span class="user-badge"><span class="dot"></span><span id="userBadgeText"></span></span>
        <button class="btn btn-ghost btn-sm hidden" id="btnAdminToggle" onclick="toggleAdminView()">Admin</button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Déconnexion</button>
      </div>
    </header>

    <main id="mainContent" style="flex:1;padding:24px 0 60px"></main>
  </div>

</div>

async function sbRequest(path, options = {}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json",
    ...(options.headers || {})
  };
  const res = await fetch(url, { ...options, headers });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Supabase error ${res.status}: ${text}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const sb = {
  select: (table, query = "") => sbRequest(`${table}?select=*${query}`),
  insert: (table, data) => sbRequest(table, { method: "POST", body: JSON.stringify(data), headers: { Prefer: "return=representation" } }),
  update: (table, id, data) => sbRequest(`${table}?id=eq.${id}`, { method: "PATCH", body: JSON.stringify(data), headers: { Prefer: "return=representation" } }),
  remove: (table, id) => sbRequest(`${table}?id=eq.${id}`, { method: "DELETE" }),
};

async function doLogin() {
  const login = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value;
  const errEl = document.getElementById("loginError");
  const btn = document.getElementById("btnLogin");
  errEl.textContent = "";

  if (!login || !pass) {
    errEl.textContent = "Merci de renseigner l'identifiant et le mot de passe.";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const rows = await sb.select("utilisateurs", `&login=eq.${encodeURIComponent(login)}`);
    const u = rows && rows[0];
    if (!u || u.password !== pass) {
      errEl.textContent = "Identifiant ou mot de passe incorrect.";
      btn.disabled = false;
      btn.textContent = "Se connecter";
      return;
    }
    if (!u.actif) {
      errEl.textContent = "Ce compte est désactivé. Contactez l'administrateur.";
      btn.disabled = false;
      btn.textContent = "Se connecter";
      return;
    }
    STATE.user = u;
    sessionStorage.setItem("fds_user", JSON.stringify(u));
    await bootApp();
  } catch (e) {
    console.error(e);
    errEl.textContent = "Erreur de connexion au serveur. Vérifiez votre connexion internet.";
    btn.disabled = false;
    btn.textContent = "Se connecter";
  }
}

      sb.select("baremes_taches", "&order=ordre.asc"),
      sb.select("formules", "&order=ordre.asc&actif=eq.true"),

/* ============================================================
   MOTEUR DE CALCUL
   - Chaque tâche au m² donne une fourchette de temps (min-max)
   - Linge/Rangement: saisie directe en minutes (tranches de 30min)
   - Le total se présente en fourchette ; la MOYENNE sert pour
     tous les calculs en aval (créneaux, budget, optimisation)
   ============================================================ */

function getBareme(tacheKey) {
  return STATE.baremes.find(b => b.tache_key === tacheKey);
}

// Estimation de la surface vitrée à partir du nombre de pièces (2m² par pièce, vitrage courant)
const M2_VITRE_PAR_PIECE_STANDARD = 2;
const M2_VITRE_PAR_PIECE_IMPORTANT = 4;
function estimerSurfaceVitree(devis) {
  const nbPieces = devis.logement.nb_pieces || 0;
  const ratio = devis.vitrage_important ? M2_VITRE_PAR_PIECE_IMPORTANT : M2_VITRE_PAR_PIECE_STANDARD;
  return nbPieces * ratio;
}

// Retourne la surface de référence à utiliser pour une tâche donnée
function getSurfaceReference(tacheKey, devis) {
  if (tacheKey === "vitrerie") return estimerSurfaceVitree(devis);
  return devis.logement.superficie || 0;
}

// Calcule le temps (en minutes) pour une tâche au m², niveau donné -> {min, max}
function calcTacheMinutes(tacheKey, niveau, superficie) {
  const b = getBareme(tacheKey);
  if (!b || !superficie) return { min: 0, max: 0 };
  const minPerM2 = b[`${niveau}_min`];
  const maxPerM2 = b[`${niveau}_max`];
  return { min: minPerM2 * superficie, max: maxPerM2 * superficie };
}

// Calcule le temps total (minutes) de toutes les tâches actives d'un devis -> {min, max, moyenne}
function calcTempsTotalMinutes(devis) {
  let min = 0, max = 0;

  for (const [tacheKey, info] of Object.entries(devis.taches)) {
    if (!info.active) continue;
    const surfaceRef = getSurfaceReference(tacheKey, devis);
    const t = calcTacheMinutes(tacheKey, info.niveau, surfaceRef);
    min += t.min;
    max += t.max;
  }
  // Linge et Rangement: saisie directe, valeur fixe (pas de fourchette)
  min += devis.linge_minutes || 0;
  max += devis.linge_minutes || 0;
  min += devis.rangement_minutes || 0;
  max += devis.rangement_minutes || 0;

  return { min, max, moyenne: (min + max) / 2 };
}

function minutesToHeures(minutes) {
  return minutes / 60;
}

// Retourne le tarif horaire applicable pour une formule donnée
function getTarifHoraire(formuleKey) {
  const formule = STATE.formules.find(f => f.formule_key === formuleKey);
  const tarifKey = formule ? formule.tarif_key : "menage";
  return STATE.config.tarifs[tarifKey] ?? 30;
}

// Retourne le coefficient (nb d'interventions par mois) pour une fréquence donnée
function getCoefficientFrequence(frequence) {
  const coefs = STATE.config.tarifs.coefficients_frequence || { hebdomadaire: 4.33, bimensuel: 2.17, mensuel: 1 };
  return coefs[frequence] ?? 1;
}

// Calcule le coût total {min, max, moyenne} par intervention, par mois, par an, et l'après crédit d'impôt
function calcCout(devis) {
  const temps = calcTempsTotalMinutes(devis);
  const heuresMin = minutesToHeures(temps.min);
  const heuresMax = minutesToHeures(temps.max);
  const heuresMoy = minutesToHeures(temps.moyenne);
  const tarif = getTarifHoraire(devis.formule_key);

  // Coût par intervention (une seule visite)
  const totalMin = heuresMin * tarif;
  const totalMax = heuresMax * tarif;
  const totalMoy = heuresMoy * tarif;

  // Coût mensuel et annuel, basés sur la fréquence d'intervention
  const coefMensuel = getCoefficientFrequence(devis.frequence);
  const mensuelMin = totalMin * coefMensuel;
  const mensuelMax = totalMax * coefMensuel;
  const mensuelMoy = totalMoy * coefMensuel;
  const annuelMoy = mensuelMoy * 12;

  const tauxCredit = STATE.config.credit_impot_taux ?? 0.5;
  const apresCreditMoy = totalMoy * (1 - tauxCredit);
  const apresCreditMensuelMoy = mensuelMoy * (1 - tauxCredit);
  const apresCreditAnnuelMoy = annuelMoy * (1 - tauxCredit);

  return {
    heures: { min: heuresMin, max: heuresMax, moyenne: heuresMoy },
    total: { min: totalMin, max: totalMax, moyenne: totalMoy },
    mensuel: { min: mensuelMin, max: mensuelMax, moyenne: mensuelMoy },
    annuel: { moyenne: annuelMoy },
    apresCreditImpot: apresCreditMoy,
    apresCreditImpotMensuel: apresCreditMensuelMoy,
    apresCreditImpotAnnuel: apresCreditAnnuelMoy,
    tarifHoraire: tarif,
    coefMensuel,
  };
}

// Applique les tâches par défaut d'une formule au state du devis
function appliquerFormule(devis, formuleKey) {
  const formule = STATE.formules.find(f => f.formule_key === formuleKey);
  if (!formule) return;

  devis.formule_key = formuleKey;
  // Réinitialiser les tâches
  devis.taches = {};
  devis.linge_minutes = 0;
  devis.rangement_minutes = 0;

  for (const b of STATE.baremes) {
    const niveauDefaut = formule.taches_defaut[b.tache_key];
    devis.taches[b.tache_key] = {
      active: !!niveauDefaut,
      niveau: niveauDefaut || "standard",
    };
  }
  // Rangement toujours décoché par défaut (déjà géré car absent de taches_defaut)
  if (formule.taches_defaut.linge) {
    devis.linge_minutes = 60; // 1h par défaut si la formule inclut le linge
  }
}

// Calcule le plan de roulement sur 4 semaines si le budget ne couvre pas le temps requis
function genererPlanRoulement(devis, heuresDisponiblesParSemaine) {
  const tachesActives = Object.entries(devis.taches)
    .filter(([k, v]) => v.active)
    .map(([k, v]) => ({ key: k, label: getBareme(k)?.tache_label || k, niveau: v.niveau }));

  if (tachesActives.length === 0) return null;

  // Répartition simple sur 4 semaines en alternant les tâches
  const semaines = [[], [], [], []];
  tachesActives.forEach((t, idx) => {
    semaines[idx % 4].push(t);
  });

  return semaines.map((taches, i) => ({
    semaine: i + 1,
    taches: taches.map(t => t.label),
  }));
}

const STEP_LABELS = ["Client", "Formule", "Tâches", "Créneaux", "Récapitulatif"];

function progressBarHTML(currentStep) {
  const pct = ((currentStep - 1) / (STEP_LABELS.length - 1)) * 100;
  return `
    <div class="progress-wrap no-print">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-steps">
        ${STEP_LABELS.map((label, i) => {
          const stepNum = i + 1;
          const cls = stepNum < currentStep ? "done" : stepNum === currentStep ? "current" : "";
          return `<span class="step ${cls}">${label}</span>`;
        }).join("")}
      </div>
    </div>`;
}

function renderTunnelStep() {
  const step = STATE.devis.step;
  let bodyHTML = "";

  if (step === 0) bodyHTML = renderStepAccueil();
  else if (step === 1) bodyHTML = renderStepClient();
  else if (step === 2) bodyHTML = renderStepPivotOuFormule();
  else if (step === 2.5) bodyHTML = renderStepTaches();
  else if (step === 3) bodyHTML = renderStepCreneaux();
  else if (step === 4) bodyHTML = renderStepRecap();

  const showProgress = step >= 1;
  document.getElementById("mainContent").innerHTML = `
    ${showProgress ? progressBarHTML(Math.min(Math.ceil(step), 5)) : ""}
    <div class="container" style="margin-top:24px">${bodyHTML}</div>
  `;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function goToStep(step) {
  STATE.devis.step = step;
  renderTunnelStep();
  sauvegarderBrouillon();
}

/* ---------- Sauvegarde automatique en brouillon (Supabase) ---------- */
let brouillonSaveTimer = null;
let brouillonSaving = false;

function sauvegarderBrouillon() {
  const d = STATE.devis;
  // Ne sauvegarde que si on a au moins un nom client et une superficie (devis a minima commencé)
  if (!d.client.nom || !d.logement.superficie) return;

  clearTimeout(brouillonSaveTimer);
  brouillonSaveTimer = setTimeout(async () => {
    if (brouillonSaving) return;
    brouillonSaving = true;
    try {
      const cout = (Object.keys(d.taches).length > 0 || d.linge_minutes || d.rangement_minutes) ? calcCout(d) : null;
      const payload = {
        collaborateur_id: STATE.user.id,
        client_civilite: d.client.civilite,
        client_nom: d.client.nom,
        client_prenom: d.client.prenom,
        client_email: d.client.email,
        client_telephone: d.client.telephone,
        logement: d.logement,
        chemin: d.chemin,
        formule_key: d.formule_key,
        taches: { detail: d.taches, linge_minutes: d.linge_minutes, rangement_minutes: d.rangement_minutes, vitrage_important: d.vitrage_important, plan_roulement: d.plan_roulement },
        creneaux: d.creneaux,
        heures_min: cout ? cout.heures.min : null,
        heures_max: cout ? cout.heures.max : null,
        heures_moyenne: cout ? cout.heures.moyenne : null,
        total_ttc: cout ? cout.total.moyenne : null,
        total_apres_credit_impot: cout ? cout.apresCreditImpot : null,
        statut: "brouillon",
      };
      if (d.id) {
        await sb.update("devis", d.id, payload);
      } else {
        const saved = await sb.insert("devis", payload);
        d.id = saved[0].id;
      }
    } catch (e) {
      console.error("Sauvegarde brouillon échouée (sans impact pour l'utilisateur) :", e);
    } finally {
      brouillonSaving = false;
    }
  }, 600);
}

function nouveauDevis() {
  STATE.devis = defaultDevisState();
  STATE.devis.step = 1;
  renderTunnelStep();
}

// Reprend un brouillon exactement où il a été laissé (même étape, mêmes données)
function reprendreBrouillon(id) {
  const source = devisListCache.find(d => d.id === id);
  if (!source) return;
  const fresh = defaultDevisState();
  fresh.id = source.id;
  fresh.client = {
    civilite: source.client_civilite || "Mme",
    nom: source.client_nom || "",
    prenom: source.client_prenom || "",
    email: source.client_email || "",
    telephone: source.client_telephone || "",
  };
  fresh.logement = source.logement || fresh.logement;
  fresh.chemin = source.chemin;
  fresh.formule_key = source.formule_key;
  fresh.taches = (source.taches && source.taches.detail) || {};
  fresh.linge_minutes = (source.taches && source.taches.linge_minutes) || 0;
  fresh.rangement_minutes = (source.taches && source.taches.rangement_minutes) || 0;
  fresh.vitrage_important = (source.taches && source.taches.vitrage_important) || false;
  fresh.plan_roulement = (source.taches && source.taches.plan_roulement) || null;
  fresh.creneaux = source.creneaux || [];
  // Reprend à l'étape la plus avancée selon les données déjà présentes
  fresh.step = determinerEtapeReprise(fresh);
  STATE.devis = fresh;
  renderTunnelStep();
}

function determinerEtapeReprise(d) {
  if (d.creneaux.length > 0 || Object.values(d.taches).some(t => t.active)) return 3;
  if (d.formule_key) return 2.5;
  if (d.chemin) return 2;
  return 1;
}

function dupliquerDevis(id) {
  const source = devisListCache.find(d => d.id === id);
  if (!source) return;
  const fresh = defaultDevisState();
  fresh.client = { ...source.client_civilite && { civilite: source.client_civilite }, nom: source.client_nom || "", prenom: source.client_prenom || "", email: source.client_email || "", telephone: source.client_telephone || "" };
  fresh.client.civilite = source.client_civilite || "Mme";
  fresh.logement = source.logement || fresh.logement;
  fresh.chemin = source.chemin;
  fresh.formule_key = source.formule_key;
  fresh.taches = (source.taches && source.taches.detail) || {};
  fresh.linge_minutes = (source.taches && source.taches.linge_minutes) || 0;
  fresh.rangement_minutes = (source.taches && source.taches.rangement_minutes) || 0;
  fresh.vitrage_important = (source.taches && source.taches.vitrage_important) || false;
  fresh.creneaux = source.creneaux || [];
  fresh.step = 1;
  STATE.devis = fresh;
  renderTunnelStep();
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" });
}

function escapeHTML(str) {
  if (str == null) return "";
  return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

    STATE.devis.chemin = null;

  } else {
    goToStep(1);
  }
}

function setBudgetMontant(v) { STATE.devis.budget_montant = v === "" ? null : Number(v); }

  appliquerFormule(STATE.devis, key);
  renderTunnelStep();
}

  const d = STATE.devis;
  if (d.chemin === "budget" && (!d.budget_montant || d.budget_montant <= 0)) {

  }
  if (!d.frequence) {
    alert("Merci de choisir la fréquence d'intervention.");

  }

/* ---------- Étape 2.5 : Configuration des tâches et niveaux ---------- */
const MINUTES_OPTIONS = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330, 360];

function formatMinutesLabel(min) {
  if (min === 0) return "Non programmé";
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h} h`;
  return `${h} h ${m}`;
}

// Formate une durée en minutes -> heures décimales lisibles, ex: 95 -> "1h35"
function formatMinutesEnHeures(min) {
  const totalMin = Math.round(min);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h} h`;
  return `${h} h ${String(m).padStart(2, "0")}`;
}

        </div>
        <div class="accordion-body">

            ${["leger", "standard", "approfondi"].map(niv => `

  }).join("");

  const tempsTotal = calcTempsTotalMinutes(d);

  return `
    <h1 class="section-title">Configuration des tâches</h1>
    <p class="section-sub">Ajustez les tâches et leur niveau d'intervention. Superficie : ${superficie} m².</p>

    <div class="stack">
      ${tachesRows}

      <div class="accordion-item ${d.linge_minutes > 0 ? "open" : ""}">

          <div style="font-weight:600;font-size:.92rem">Linge / Repassage</div>
          <svg class="accordion-chevron" width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M5 7l5 5 5-5" stroke="#6B5E7E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="accordion-body">
          <div class="field" style="margin-top:10px">
            <label>Temps estimé</label>
            <select onchange="setLingeMinutes(this.value)">
              ${MINUTES_OPTIONS.map(m => `<option value="${m}" ${d.linge_minutes === m ? "selected" : ""}>${formatMinutesLabel(m)}</option>`).join("")}
            </select>

          <div style="font-weight:600;font-size:.92rem">Rangement</div>
          <svg class="accordion-chevron" width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M5 7l5 5 5-5" stroke="#6B5E7E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="accordion-body">
          <div class="field" style="margin-top:10px">

      </div>

    <div class="tunnel-footer" style="margin-top:24px;border-radius:var(--radius-md);border:1.5px solid var(--line)">

      <button class="btn btn-primary" onclick="validateStepTaches()">Continuer →</button>
    </div>
  `;
}

function toggleAccordion(headEl) {
  const item = headEl.closest(".accordion-item");
  item.classList.toggle("open");
}

function toggleTache(key, active) {
  if (!STATE.devis.taches[key]) STATE.devis.taches[key] = { active: false, niveau: "standard" };
  STATE.devis.taches[key].active = active;
  renderTunnelStep();
}

function setTacheNiveau(key, niveau) {
  STATE.devis.taches[key].niveau = niveau;
  renderTunnelStep();
}

function toggleVitrageImportant(checked) {
  STATE.devis.vitrage_important = checked;
  renderTunnelStep();
}

function setLingeMinutes(v) { STATE.devis.linge_minutes = Number(v); renderTunnelStep(); }
function setRangementMinutes(v) { STATE.devis.rangement_minutes = Number(v); renderTunnelStep(); }

function validateStepTaches() {
  const hasActiveTache = Object.values(STATE.devis.taches).some(t => t.active) || STATE.devis.linge_minutes > 0 || STATE.devis.rangement_minutes > 0;
  if (!hasActiveTache) {
    alert("Merci de sélectionner au moins une tâche.");
    return;
  }

  // CHEMIN BUDGET : vérifier si le temps nécessaire par intervention dépasse le temps permis par le budget
  if (STATE.devis.chemin === "budget") {
    const cout = calcCout(STATE.devis);
    const tarif = cout.tarifHoraire;
    const coefMensuel = getCoefficientFrequence(STATE.devis.frequence);
    const budgetParIntervention = STATE.devis.budget_montant / coefMensuel;
    const heuresPermisesParIntervention = budgetParIntervention / tarif;
    const heuresNecessairesParIntervention = cout.heures.moyenne;

    if (heuresNecessairesParIntervention > heuresPermisesParIntervention) {
      STATE.devis.plan_roulement = genererPlanRoulement(STATE.devis, heuresPermisesParIntervention);
    } else {
      STATE.devis.plan_roulement = null;
    }
  }

  goToStep(3);
}

/* ---------- Étape 3 : Créneaux hebdomadaires ---------- */
const JOURS_SEMAINE = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

// Génère les options d'heure par tranches de 15 min, de 06:00 à 21:45
function genererOptionsHeure() {
  const options = [];
  for (let h = 6; h <= 21; h++) {
    for (let m = 0; m < 60; m += 15) {
      const hh = String(h).padStart(2, "0");
      const mm = String(m).padStart(2, "0");
      options.push(`${hh}:${mm}`);
    }
  }
  return options;
}
const HEURE_OPTIONS = genererOptionsHeure();

function heureSelectHTML(value, onchangeAttr) {
  return `<select ${onchangeAttr}>
    ${HEURE_OPTIONS.map(h => `<option value="${h}" ${h === value ? "selected" : ""}>${h}</option>`).join("")}
  </select>`;
}


function renderStepCreneaux() {
  const d = STATE.devis;
  const cout = calcCout(d);

  const planRoulementHTML = d.plan_roulement ? `
    <div class="alert alert-info" style="margin-bottom:20px">
      <div>
        <strong>Le budget ne couvre pas l'intégralité des tâches chaque semaine.</strong>
        Un plan de roulement sur 4 semaines a été proposé ci-dessous — ajustable si besoin.
        ${renderPlanRoulement(d.plan_roulement)}
      </div>
    </div>
  ` : "";

  const creneauxHTML = d.creneaux.map((c, idx) => `
    <div class="card" style="padding:18px;margin-bottom:12px">
      <div class="flex-between" style="margin-bottom:10px">
        <strong style="font-size:.88rem">Créneau ${idx + 1}</strong>
        <button class="btn-remove-creneau" onclick="supprimerCreneau(${idx})" style="background:none;border:none;color:var(--rouge);cursor:pointer;font-size:.85rem">Supprimer</button>
      </div>
      <div class="pill-group" style="margin-bottom:12px">
        ${JOURS_SEMAINE.map((j, jIdx) => `
          <button type="button" class="pill ${c.jours.includes(jIdx) ? "active" : ""}" onclick="toggleCreneauJour(${idx}, ${jIdx})">${j}</button>
        `).join("")}
      </div>
      <div class="grid-2">
        <div class="field" style="margin-bottom:0">
          <label>Heure de début</label>
          ${heureSelectHTML(c.heure_debut, `onchange="setCreneauField(${idx}, 'heure_debut', this.value)"`)}
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Heure de fin</label>
          ${heureSelectHTML(c.heure_fin, `onchange="setCreneauField(${idx}, 'heure_fin', this.value)"`)}
        </div>
      </div>
    </div>
  `).join("");

  const totalDisponible = calcHeuresDisponiblesCreneaux(d.creneaux);
  const heuresRequises = cout.heures.moyenne;
  const insuffisant = totalDisponible < heuresRequises;

  return `
    <h1 class="section-title">Créneaux de disponibilité</h1>
    <p class="section-sub">Indiquez les disponibilités hebdomadaires du client.</p>

    ${planRoulementHTML}

    <div class="stack">${creneauxHTML}</div>

    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="ajouterCreneau()">+ Ajouter un créneau</button>

    ${d.creneaux.length > 0 ? `
      <div class="alert ${insuffisant ? "alert-warning" : "alert-success"}" style="margin-top:20px">
        ${insuffisant
          ? `⚠ Disponibilités insuffisantes : ${totalDisponible.toFixed(1)} h disponibles pour ${heuresRequises.toFixed(1)} h nécessaires en moyenne.`
          : `✓ Disponibilités suffisantes : ${totalDisponible.toFixed(1)} h disponibles pour ${heuresRequises.toFixed(1)} h nécessaires en moyenne.`}
      </div>
    ` : ""}

    <div class="tunnel-footer" style="margin-top:24px;border-radius:var(--radius-md);border:1.5px solid var(--line)">
      <button class="btn btn-ghost" onclick="goToStep(2.5)">← Retour</button>
      <button class="btn btn-primary" onclick="goToStep(4)">Continuer →</button>
    </div>
  `;
}

function renderPlanRoulement(plan) {
  return `
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
      ${plan.map(s => `
        <div style="background:white;border-radius:10px;padding:10px 14px;font-size:.85rem">
          <strong>Semaine ${s.semaine}</strong> — ${s.taches.join(", ")}
        </div>
      `).join("")}
    </div>
  `;
}

function ajouterCreneau() {
  STATE.devis.creneaux.push({ jours: [], heure_debut: "09:00", heure_fin: "11:00" });
  renderTunnelStep();
}

function supprimerCreneau(idx) {
  STATE.devis.creneaux.splice(idx, 1);
  renderTunnelStep();
}

function toggleCreneauJour(creneauIdx, jourIdx) {
  const jours = STATE.devis.creneaux[creneauIdx].jours;
  const pos = jours.indexOf(jourIdx);
  if (pos >= 0) jours.splice(pos, 1);
  else jours.push(jourIdx);
  renderTunnelStep();
}

function setCreneauField(idx, field, value) {
  STATE.devis.creneaux[idx][field] = value;
  renderTunnelStep();
}

function calcHeuresDisponiblesCreneaux(creneaux) {
  let total = 0;
  for (const c of creneaux) {
    if (!c.heure_debut || !c.heure_fin || c.jours.length === 0) continue;
    const [h1, m1] = c.heure_debut.split(":").map(Number);
    const [h2, m2] = c.heure_fin.split(":").map(Number);
    const dureeH = (h2 * 60 + m2 - (h1 * 60 + m1)) / 60;
    if (dureeH > 0) total += dureeH * c.jours.length;
  }
  return total;
}

/* ---------- Étape 4 : Récapitulatif & validation ---------- */
function renderStepRecap() {
  const d = STATE.devis;
  const cout = calcCout(d);
  const formule = STATE.formules.find(f => f.formule_key === d.formule_key);

  const incoherences = [];
  if (!d.client.email && !d.client.telephone) incoherences.push("Aucun moyen de contact renseigné (email ou téléphone)");
  if (d.creneaux.length === 0) incoherences.push("Aucun créneau de disponibilité renseigné");
  const dispoTotal = calcHeuresDisponiblesCreneaux(d.creneaux);
  if (dispoTotal < cout.heures.moyenne) incoherences.push("Disponibilités insuffisantes par rapport au volume d'heures estimé");

  const tachesActivesHTML = Object.entries(d.taches).filter(([k, v]) => v.active).map(([k, v]) => {
    const b = getBareme(k);
    const t = calcTacheMinutes(k, v.niveau, getSurfaceReference(k, d));
    return `<li>${escapeHTML(b.tache_label)} — <span class="badge badge-${v.niveau}">${v.niveau}</span> <span style="color:var(--ink-soft)">(${formatMinutesEnHeures(t.min)} – ${formatMinutesEnHeures(t.max)})</span></li>`;
  }).join("");

  return `
    <h1 class="section-title">Récapitulatif du devis</h1>
    <p class="section-sub">Vérifiez les informations avant de finaliser.</p>

    ${incoherences.length > 0 ? `
      <div class="alert alert-warning" style="margin-bottom:20px">
        <div>
          <strong>Points à vérifier :</strong>
          <ul style="margin:6px 0 0 18px">${incoherences.map(i => `<li>${i}</li>`).join("")}</ul>
        </div>
      </div>
    ` : `<div class="alert alert-success" style="margin-bottom:20px">✓ Le devis est cohérent, prêt à être finalisé.</div>`}

    <div class="card">
      <h3 style="font-size:1rem;margin-bottom:10px">Client</h3>
      <p style="font-size:.92rem;color:var(--ink-soft)">
        ${escapeHTML(d.client.civilite)} ${escapeHTML(d.client.nom)} ${escapeHTML(d.client.prenom)}<br>
        ${escapeHTML(d.client.email) || "—"} · ${escapeHTML(d.client.telephone) || "—"}<br>
        ${d.logement.superficie} m² · ${d.logement.nb_pieces || "?"} pièces · ${d.logement.nb_habitants || "?"} habitant(s)
        ${d.logement.enfants_bas_age ? " · Enfants en bas âge" : ""}${d.logement.animaux ? " · Animaux" : ""}
      </p>

      <div class="divider"></div>
      <h3 style="font-size:1rem;margin-bottom:10px">Formule : ${escapeHTML(formule?.label || "")}</h3>
      <ul style="font-size:.88rem;color:var(--ink-soft);margin-left:18px;line-height:1.8">
        ${tachesActivesHTML}
        ${d.linge_minutes > 0 ? `<li>Linge / Repassage — ${formatMinutesLabel(d.linge_minutes)}</li>` : ""}
        ${d.rangement_minutes > 0 ? `<li>Rangement — ${formatMinutesLabel(d.rangement_minutes)}</li>` : ""}
      </ul>

      <div class="divider"></div>
      <div class="flex-between" style="margin-bottom:8px">
        <span>Volume horaire par intervention</span>
        <span class="range-display">${cout.heures.min.toFixed(1)} – ${cout.heures.max.toFixed(1)} h</span>
      </div>
      <div class="flex-between" style="margin-bottom:8px">
        <span>Tarif horaire</span>
        <span class="range-display">${cout.tarifHoraire} €/h</span>
      </div>
      <div class="flex-between" style="margin-bottom:8px">
        <span>Fréquence d'intervention</span>
        <span class="range-display">${d.frequence.charAt(0).toUpperCase() + d.frequence.slice(1)}</span>
      </div>
      <div class="flex-between" style="font-size:1.05rem;margin-top:10px">
        <strong>Coût par intervention</strong>
        <strong class="range-display">${cout.total.min.toFixed(0)} – ${cout.total.max.toFixed(0)} €</strong>
      </div>
      <div class="flex-between" style="font-size:1.2rem;margin-top:8px">
        <strong>Coût mensuel</strong>
        <strong class="range-display">${cout.mensuel.min.toFixed(0)} – ${cout.mensuel.max.toFixed(0)} €</strong>
      </div>
      <div class="flex-between" style="font-size:.95rem;margin-top:6px;color:var(--ink-soft)">
        <span>Coût annuel estimé</span>
        <span class="range-display">${cout.annuel.moyenne.toFixed(0)} €</span>
      </div>
      <div class="field-hint" style="margin-top:10px">
        Calcul basé sur ${cout.coefMensuel.toFixed(2)} intervention(s) par mois en moyenne pour une fréquence "${d.frequence}".

        <div class="flex-between" style="margin-top:6px">
          <span style="font-size:.78rem;color:#1A5C42">Annuel après crédit d'impôt</span>
          <span style="font-size:.95rem;color:#1A5C42;font-weight:700">${cout.apresCreditImpotAnnuel.toFixed(0)} €</span>

    </div>
  `;

async function finaliserDevis() {
  const btn = document.getElementById("btnFinaliser");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const d = STATE.devis;
  const cout = calcCout(d);

  const payload = {
    collaborateur_id: STATE.user.id,
    client_civilite: d.client.civilite,
    client_nom: d.client.nom,
    client_prenom: d.client.prenom,
    client_email: d.client.email,
    client_telephone: d.client.telephone,
    logement: d.logement,
    chemin: d.chemin,
    formule_key: d.formule_key,
    taches: { detail: d.taches, linge_minutes: d.linge_minutes, rangement_minutes: d.rangement_minutes, vitrage_important: d.vitrage_important, plan_roulement: d.plan_roulement },
    creneaux: d.creneaux,
    heures_min: cout.heures.min,
    heures_max: cout.heures.max,
    heures_moyenne: cout.heures.moyenne,
    total_ttc: cout.total.moyenne,
    total_apres_credit_impot: cout.apresCreditImpot,
    statut: "valide",
  };

  try {
    let saved;
    if (d.id) {
      saved = await sb.update("devis", d.id, payload);
    } else {
      saved = await sb.insert("devis", payload);
    }
    STATE.devis.id = saved[0].id;
    genererPDF(STATE.devis, cout);
  } catch (e) {
    console.error(e);
    alert("Erreur lors de l'enregistrement du devis. Vérifiez votre connexion et réessayez.");
    btn.disabled = false;
    btn.textContent = "Finaliser et générer le PDF";
  }
}

function updateTarifField(key, value) {

const baremeEdits = {};
function updateBaremeField(id, field, value) {
  if (!baremeEdits[id]) baremeEdits[id] = {};
  baremeEdits[id][field] = Number(value);
}

async function saveBaremeRow(id) {
  const edits = baremeEdits[id];
  if (!edits) return;
  try {
    await sb.update("baremes_taches", id, edits);
    const b = STATE.baremes.find(x => x.id === id);
    Object.assign(b, edits);
    delete baremeEdits[id];
    alert("Barème mis à jour.");
  } catch (e) {
    console.error(e);
    alert("Erreur lors de l'enregistrement.");
  }
}

      <td>
        <button class="btn btn-sm btn-ghost" onclick="toggleUserActif('${u.id}', ${!u.actif})">${u.actif ? "Désactiver" : "Activer"}</button>
        ${u.login !== "admin" ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Supprimer</button>` : ""}
      </td>
    </tr>
  `).join("");

  el.innerHTML = `
    <div class="card" style="margin-bottom:20px">
      <h3 style="font-size:1.05rem;margin-bottom:16px">Ajouter un utilisateur</h3>
      <div class="grid-3">
        <div class="field"><label>Identifiant</label><input type="text" id="newUserLogin" placeholder="ex: julie"></div>
        <div class="field"><label>Mot de passe</label><input type="text" id="newUserPass" placeholder="mot de passe"></div>
        <div class="field"><label>Nom complet</label><input type="text" id="newUserNom" placeholder="Julie Martin"></div>
      </div>
      <div class="field" style="max-width:200px">
        <label>Rôle</label>
        <select id="newUserRole"><option value="collaborateur">Collaborateur</option><option value="admin">Admin</option></select>
      </div>
      <button class="btn btn-primary" onclick="createUser()">Créer l'utilisateur</button>
    </div>
    <div class="card" style="overflow-x:auto">
      <table class="admin-table">
        <thead><tr><th>Identifiant</th><th>Nom</th><th>Rôle</th><th>Statut</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

async function createUser() {
  const login = document.getElementById("newUserLogin").value.trim();
  const password = document.getElementById("newUserPass").value;
  const nom = document.getElementById("newUserNom").value.trim();
  const role = document.getElementById("newUserRole").value;

  if (!login || !password) { alert("Identifiant et mot de passe requis."); return; }

  try {
    await sb.insert("utilisateurs", { login, password, nom, role, actif: true });
    renderAdminUtilisateurs();
  } catch (e) {
    console.error(e);
    alert("Erreur : cet identifiant existe peut-être déjà.");
  }
}

async function toggleUserActif(id, newVal) {
  try {
    await sb.update("utilisateurs", id, { actif: newVal });
    renderAdminUtilisateurs();
  } catch (e) {
    console.error(e);
    alert("Erreur lors de la mise à jour.");
  }
}

async function deleteUser(id) {
  if (!confirm("Supprimer définitivement cet utilisateur ?")) return;
  try {
    await sb.remove("utilisateurs", id);
    renderAdminUtilisateurs();
  } catch (e) {
    console.error(e);
    alert("Erreur lors de la suppression.");
  }
}

/* ---------- Onglet Devis (historique complet, admin) ---------- */
async function renderAdminDevis() {
  const el = document.getElementById("adminTabContent");
  el.innerHTML = renderLoadingInline();
  try {
    adminDataCache.devis = await sb.select("devis", "&order=created_at.desc&limit=200");
  } catch (e) {
    el.innerHTML = `<div class="alert alert-error">Impossible de charger les devis.</div>`;
    return;
  }

  const rows = adminDataCache.devis.map(d => `
    <tr>
      <td>${escapeHTML(d.client_nom || "—")} ${escapeHTML(d.client_prenom || "")}</td>
      <td>${d.logement?.superficie || "—"} m²</td>
      <td>${d.total_ttc ? d.total_ttc.toFixed(0) + " €" : "—"}</td>
      <td>${formatDate(d.created_at)}</td>
      <td><span class="badge badge-standard">${escapeHTML(d.statut)}</span></td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteDevisAdmin('${d.id}')">Supprimer</button></td>
    </tr>
  `).join("");

  el.innerHTML = `
    <div class="card" style="overflow-x:auto">
      <h3 style="font-size:1.05rem;margin-bottom:16px">Historique des devis (${adminDataCache.devis.length})</h3>
      <table class="admin-table">
        <thead><tr><th>Client</th><th>Surface</th><th>Montant</th><th>Date</th><th>Statut</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

async function deleteDevisAdmin(id) {
  if (!confirm("Supprimer définitivement ce devis ?")) return;
  try {
    await sb.remove("devis", id);
    renderAdminDevis();
  } catch (e) {
    console.error(e);
    alert("Erreur lors de la suppression.");
  }
}








</script>
</body>
